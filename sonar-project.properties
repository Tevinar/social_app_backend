# Identify the SonarQube Cloud project that will receive the analysis results.
sonar.projectKey=Tevinar_social_app_backend

# Identify the SonarQube Cloud organization that owns the project.
sonar.organization=tevinar

# Define the main TypeScript sources that should be analyzed.
sonar.sources=src,scripts

# Declare that test files live somewhere under `src`.
# This defines the broad test-code scope before any finer filtering is applied.
sonar.tests=src

# Narrow the test scope to Jest spec files only.
# Files matching this pattern are treated as tests instead of main source files.
sonar.test.inclusions=src/**/*.spec.ts

# Tell SonarQube where Jest writes the LCOV coverage report.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclude SQL files from analysis since they are
# analyzed by sonarqube as PL/SQL files, which is not relevant for this project.
sonar.exclusions=database-migrations/*.sql

# Avoid scoring the application entry point and bootstrapping modules in coverage.
sonar.coverage.exclusions=\
scripts/**,\
src/main.ts,\
src/app/bootstrap/**,\
src/core/**,\
src/features/auth/presentation/**,\
src/features/auth/infrastructure/**,\
src/app/auth/**,\
src/features/auth/auth.module.ts,\
src/features/blog/**,\
src/features/chat/**,\
