services:
  # Run PostgreSQL on the VM as a container so the backend can use a real
  # database without requiring a separate managed Cloud SQL instance for dev.
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      # Initialize the database with the configured application user and DB name.
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      # Read the database password from a mounted file instead of an env var.
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      # Persist database state across container restarts on the VM.
      - postgres_data:/var/lib/postgresql/data
      # Mount the password file at the path expected by the Postgres image.
      - ./.secrets/postgres_password.txt:/run/secrets/postgres_password:ro

  # Run the application from the image built and pushed by GitHub Actions.
  backend:
    image: europe-west9-docker.pkg.dev/social-app-dev-123456/backend-images/social-app-backend:${IMAGE_TAG}
    restart: unless-stopped
    env_file:
      # Load runtime configuration generated by the deployment workflow.
      - .env
    depends_on:
      - postgres
    ports:
      # Bind only to VM localhost so the app stays private and is reachable
      # through SSH/IAP tunneling instead of a public firewall rule.
      - "127.0.0.1:3000:3000"
    volumes:
      # Mount the app secret files where requireSecretFile() expects them.
      - ./.secrets:/app/.secrets:ro

volumes:
  # Store Postgres data in a named volume managed by Docker on the VM.
  postgres_data:
