apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: social-app-backend
  namespace: social-app
  annotations:
    kubernetes.io/ingress.class: 'gce'
    kubernetes.io/ingress.global-static-ip-name: 'social-app-backend-ip'
    # Attach the Google-managed certificate that serves HTTPS for social-app-api.tevinar.com.
    networking.gke.io/managed-certificates: 'social-app-backend-tls'
spec:
  rules:
    - host: social-app-api.tevinar.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: social-app-backend
                port:
                  number: 80
