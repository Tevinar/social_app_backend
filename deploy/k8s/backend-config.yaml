apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: social-app-backend
  namespace: social-app
spec:
  # External Application Load Balancers cap backend HTTP responses at 30
  # seconds by default. SSE responses stay open indefinitely by design, so
  # raise the backend service timeout well beyond the expected chat session
  # length or the load balancer will abort the stream around the 30-second mark
  # even if keepalive comments are flowing.
  # We set a new timeout of 24 hours (86400 seconds) to allow for long-lived SSE connections without interruption.
  timeoutSec: 86400
  healthCheck:
    # Tell the Google load balancer to consider the backend healthy only when
    # an HTTP GET request to /health returns 200. Without this override, GKE
    # Ingress defaults to GET /, which this backend does not expose as a
    # stable 200 route, leading the load balancer to return 502.
    requestPath: /health
    # Send the health-check request to the Nest app's real listening port
    # inside the Pod instead of the Service-facing port 80.
    port: 3000
    # The ingress terminates TLS; the backend Pod itself serves plain HTTP on port 3000.
    type: HTTP
  # Attach the Google Cloud Armor security policy that applies the WAF ruleset to the backend service.
  securityPolicy:
    name: ''
  # enables request logging for the load balancer backend service, including Cloud
  # Armor-related request logs. Without that, Google says new backend-service logging
  # is disabled by default, so you generally will not get the load balancer request
  # logs you need to validate WAF behavior.
  logging:
    enable: true
    sampleRate: 1.0
