# This workflow deploys the backend to the development environment on Google Cloud.
# It builds the backend Docker image, pushes it to Artifact Registry so that it
# can be used in Google Compute Engine.
name: Deploy Dev

on:
  # Allow manual deployments.
  workflow_dispatch:

permissions:
  # Allow the workflow to read repository contents so it can build the Docker image
  contents: read
  # Allow the workflow to mint an identity token.
  # That token is then exchanged with Google Cloud for temporary credentials
  id-token: write

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    # Use the "development" GitHub environment for environment-scoped secrets.
    environment: development

    steps:
      # Make the repository contents available on the runner so later steps can
      # build the Docker image.
      - name: Checkout repository
        uses: actions/checkout@v5

      # Build the backend image from the repository Dockerfile.
      # Tag the image with the GitHub SHA (commit hash that triggered the workflow)for traceability.
      - name: Build backend Docker image
        run: docker build -t social-app-backend:${{ github.sha }} .

      # Gives this step an internal identifier named auth
      # so later steps can reference outputs from it if needed
      - id: auth
        name: Authenticate to Google Cloud
        # use Google’s official GitHub Action for authentication
        uses: google-github-actions/auth/@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          # Tells the action which Google Cloud Workload Identity Provider to use
          # that provider is the trust bridge between GitHub Actions and GCP
          workload_identity_provider: projects/1080872929921/locations/global/workloadIdentityPools/github/providers/social-app-backend
          # Tells the action which Google Cloud service account
          # the workflow should impersonate after authentication
          service_account: github-deploy-dev@social-app-dev-123456.iam.gserviceaccount.com

      - name: Set up gcloud
        # use Google’s official GitHub Action that prepares the gcloud CLI
        uses: google-github-actions/setup-gcloud/@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
        with:
          # sets the default Google Cloud project for later gcloud commands in the workflow
          project_id: social-app-dev-123456

      - name: Configure Docker for Artifact Registry
        # Configure Docker in the workflow runner so it can log in to the
        # Artifact Registry host in europe-west9 and push images there.
        run: gcloud auth configure-docker europe-west9-docker.pkg.dev --quiet

      - name: Tag backend image
        # Take the backend image built in this workflow and add the full Artifact Registry name to it,
        # using the current commit SHA as the tag, so it can be pushed to Google Cloud.
        run: |
          docker tag social-app-backend:${{ github.sha }} \
            europe-west9-docker.pkg.dev/social-app-dev-123456/backend-images/social-app-backend:${{ github.sha }}

      - name: Push backend image
        # Push the backend image built in this workflow to the Artifact Registry repository in Google Cloud
        run: |
          docker push \
            europe-west9-docker.pkg.dev/social-app-dev-123456/backend-images/social-app-backend:${{ github.sha }}

      # Creates the runtime .env file directly from the fixed dev configuration
      # checked into this workflow.
      - name: Generate runtime .env
        run: |
          cat > .env <<EOF
          NODE_ENV=development
          LOG_LEVEL=info
          PORT=3000
          API_BASE_URL=http://localhost:3000
          POSTGRES_HOST=postgres
          POSTGRES_PORT=5432
          POSTGRES_DB=social_app
          POSTGRES_USER=social_app_user
          GOOGLE_CLOUD_PROJECT_ID=social-app-dev-123456
          PUBSUB_EMULATOR_HOST=pubsub:8085
          GCS_BUCKET_NAME=tevinar-social-app-dev-123456
          AUTH_ACCESS_TTL_MINUTES=60
          AUTH_REFRESH_TTL_DAYS=30
          EOF

      # creates a local .secrets/ directory on the GitHub runner
      # writes each GitHub secret into the file name your app expects
      - name: Generate secret files
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          TOKEN_HASH_SECRET: ${{ secrets.TOKEN_HASH_SECRET }}
        run: |
          mkdir -p .secrets
          printf '%s' "$POSTGRES_PASSWORD" > .secrets/postgres_password.txt
          printf '%s' "$JWT_ACCESS_SECRET" > .secrets/jwt_access_secret.txt
          printf '%s' "$JWT_REFRESH_SECRET" > .secrets/jwt_refresh_secret.txt
          printf '%s' "$TOKEN_HASH_SECRET" > .secrets/token_hash_secret.txt

      # Create the target deployment directory on the VM ahead of time so the
      # copied .env file and secret files land in the structure Compose expects.
      - name: Ensure deploy directory exists on the VM
        run: |
          gcloud compute ssh --quiet slouis_contact@social-app-dev-vm \
            --zone=europe-west9-b \
            --tunnel-through-iap \
            --command='mkdir -p ~/social-app-dev/.secrets'

      # Copy the deploy-time files from the GitHub runner to the VM.
      - name: Copy deploy files to the VM
        run: |
          gcloud compute scp --quiet \
            --tunnel-through-iap \
            deploy/dev/docker-compose.yml \
            slouis_contact@social-app-dev-vm:~/social-app-dev/docker-compose.yml \
            --zone=europe-west9-b

          gcloud compute scp --quiet \
            --tunnel-through-iap \
            .env \
            slouis_contact@social-app-dev-vm:~/social-app-dev/.env \
            --zone=europe-west9-b

          gcloud compute scp --recurse --quiet \
            --tunnel-through-iap \
            .secrets \
            slouis_contact@social-app-dev-vm:~/social-app-dev \
            --zone=europe-west9-b

      - name: Pull container images on the VM
        run: |
          gcloud compute ssh --quiet slouis_contact@social-app-dev-vm \
            --zone=europe-west9-b \
            --tunnel-through-iap \
            --command='cd ~/social-app-dev && export IMAGE_TAG=${{ github.sha }} && docker compose pull'

      - name: Start backing services on the VM
        run: |
          gcloud compute ssh --quiet slouis_contact@social-app-dev-vm \
            --zone=europe-west9-b \
            --tunnel-through-iap \
            --command='cd ~/social-app-dev && export IMAGE_TAG=${{ github.sha }} && docker compose up -d postgres pubsub'

      - name: Ensure Pub/Sub topics exist on the VM
        run: |
          gcloud compute ssh --quiet slouis_contact@social-app-dev-vm \
            --zone=europe-west9-b \
            --tunnel-through-iap \
            --command='cd ~/social-app-dev && export IMAGE_TAG=${{ github.sha }} && docker compose run --rm --no-deps backend npm run pubsub:init-topics'

      - name: Start backend on the VM
        run: |
          gcloud compute ssh --quiet slouis_contact@social-app-dev-vm \
            --zone=europe-west9-b \
            --tunnel-through-iap \
            --command='cd ~/social-app-dev && export IMAGE_TAG=${{ github.sha }} && docker compose up -d backend'

      - name: Run database migrations on the VM
        run: |
          gcloud compute ssh --quiet slouis_contact@social-app-dev-vm \
            --zone=europe-west9-b \
            --tunnel-through-iap \
            --command='cd ~/social-app-dev && export IMAGE_TAG=${{ github.sha }} && docker compose run --rm backend npm run database:migrate'

      # Verify that the deployed backend is responding on the VM-local port
      # exposed only through the private tunnel setup.
      - name: Run VM-local smoke test
        run: |
          gcloud compute ssh --quiet slouis_contact@social-app-dev-vm \
            --zone=europe-west9-b \
            --tunnel-through-iap \
            --command='curl http://localhost:3000/docs'
