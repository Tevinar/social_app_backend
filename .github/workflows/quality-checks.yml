name: Quality Checks

concurrency:
  group: quality-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  code-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fail if TypeScript files are not formatted with the committed Prettier style.
      - name: Check formatting
        run: npm run format:check

      # Run ESLint in check mode to catch code-quality and style issues without modifying files.
      - name: Run static analysis
        run: npm run lint:check

      # Verify that both application code and spec files pass strict TypeScript compilation.
      - name: Run type checks
        run: npm run typecheck

      # Execute the Jest test suite in band (run tests serially in a single process
      # instead of using worker processes in parallel) to validate backend behavior
      # deterministically in CI.
      - name: Run tests
        run: npm test -- --runInBand

  build:
    needs: code-quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify application build
        run: npm run build
