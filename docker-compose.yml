services:
  # database service using the official PostgreSQL image
  postgres:
    # Use the official PostgreSQL image, pinned to major version 16.
    image: postgres:16
    
    # Give the container an explicit name on your machine.
    container_name: social_app_db

    # Tell Docker to always restart this container if it stops.
    # Useful so the database comes back up automatically after a crash or Docker restart.
    restart: always

    # Environment variables passed into the Postgres container at startup.
    environment:

      # Creates/sets the PostgreSQL superuser name.
      # If not specified, the default is "postgres".
      POSTGRES_USER: ${POSTGRES_USER}

      # Creates a database named "social_app" on first initialization.
      # If not specified, the default database name follows POSTGRES_USER.
      POSTGRES_DB: ${POSTGRES_DB}

      # Tell the Postgres image to read the password from a mounted secret file.
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password

    # Expose Postgres on ${POSTGRES_HOST}:${POSTGRES_PORT}.
    ports:
      - "${POSTGRES_HOST}:${POSTGRES_PORT}:5432"

    # Mount the named volume `postgres_data` at Postgres's data directory.
    volumes:
      - postgres_data:/var/lib/postgresql/data

    # Mount the declared secret into this container under `/run/secrets/`.
    secrets:
      - postgres_password
  
  # Storage service using the fsouza/fake-gcs-server image to simulate 
  # Google Cloud Storage for local development and testing.
  fake-gcs:
    image: fsouza/fake-gcs-server:1.52.3
    container_name: social_app_fake_gcs
    # Use the host/port that local clients should see in generated URLs.
    command: -public-host ${GCS_HOST}:${GCS_PORT}
    # Expose fake GCS on the host while keeping the container's internal port fixed.
    ports:
      - "${GCS_HOST}:${GCS_PORT}:4443"
    # Bind local fake storage data to a project folder for easy inspection/reset.
    volumes:
      - fake_gcs_data:/data

# Declare the named volume used to store PostgreSQL data files.
volumes:
  postgres_data:
  fake_gcs_data:

# Declare a Compose secret loaded from the local password file.
secrets:
  postgres_password:
    file: ./.secrets/postgres_password.txt
